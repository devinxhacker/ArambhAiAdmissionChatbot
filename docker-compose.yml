name: arambh

x-common-env: &common-env
  ENV: ${ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  MONGO_URI: ${MONGO_URI}
  MONGO_DB: ${MONGO_DB}
  REDIS_URL: ${REDIS_URL}
  QDRANT_URL: ${QDRANT_URL}
  QDRANT_COLLECTION: ${QDRANT_COLLECTION}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
  OLLAMA_MODEL: ${OLLAMA_MODEL}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL}
  EMBEDDING_DIM: ${EMBEDDING_DIM}
  RERANKER_MODEL: ${RERANKER_MODEL}
  SUPPORTED_LANGS: ${SUPPORTED_LANGS}
  AI_SERVICE_URL: ${AI_SERVICE_URL}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM}
  JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN}
  JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
  DATA_DIR: ${DATA_DIR}
  RAW_HTML_DIR: ${RAW_HTML_DIR}
  RAW_PDF_DIR: ${RAW_PDF_DIR}
  PROCESSED_DIR: ${PROCESSED_DIR}
  UPLOAD_DIR: ${UPLOAD_DIR}

services:

  # ───────────────────────── Infra ─────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: ["./data/redis:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes: ["./data/qdrant:/qdrant/storage"]
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  # ───────────────────────── App services ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment:
      <<: *common-env
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      AI_SERVICE_HOST: ${AI_SERVICE_HOST}
      AI_SERVICE_PORT: ${AI_SERVICE_PORT}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
      RERANK_TOP_K: ${RERANK_TOP_K}
      HYBRID_ALPHA: ${HYBRID_ALPHA}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE}
      LIVE_SEARCH_ENABLED_DEFAULT: ${LIVE_SEARCH_ENABLED_DEFAULT}
      LIVE_SEARCH_PROVIDER: ${LIVE_SEARCH_PROVIDER}
      LIVE_SEARCH_TOP_K: ${LIVE_SEARCH_TOP_K}
      LIVE_SEARCH_FETCH_TIMEOUT: ${LIVE_SEARCH_FETCH_TIMEOUT}
      LIVE_SEARCH_AUTO_THRESHOLD: ${LIVE_SEARCH_AUTO_THRESHOLD}
      LIVE_SEARCH_FOLLOW_PDFS: ${LIVE_SEARCH_FOLLOW_PDFS}
      LIVE_SEARCH_PDF_MAX: ${LIVE_SEARCH_PDF_MAX}
      HF_HOME: /data/hf
    ports: ["8100:8100"]
    volumes:
      - ./ai-services:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      ai-services: { condition: service_started }
    environment:
      <<: *common-env
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT}
      CRAWLER_MAX_DEPTH: ${CRAWLER_MAX_DEPTH}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES}
      CRAWLER_RATE_LIMIT_PER_DOMAIN: ${CRAWLER_RATE_LIMIT_PER_DOMAIN}
      CRAWLER_CONCURRENCY: ${CRAWLER_CONCURRENCY}
      CRAWLER_RESPECT_ROBOTS: ${CRAWLER_RESPECT_ROBOTS}
    volumes:
      - ./crawler:/app
      - ./data:/data
    command: celery -A app.celery_app worker -B -l info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [backend]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_AI_BASE_URL: ${VITE_AI_BASE_URL}
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # ───────────────────────── Observability ─────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./devops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana:/var/lib/grafana
    depends_on: [prometheus]
